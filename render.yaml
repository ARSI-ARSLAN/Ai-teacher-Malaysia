services:
  - type: web
    name: ai-teacher-malaysia
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: ZILLIZ_URI
        sync: false
      - key: ZILLIZ_TOKEN
        sync: false
      - key: COLLECTION_NAME
        value: malaysia_kssm_math
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: EMBEDDING_MODEL
        value: paraphrase-multilingual-MiniLM-L12-v2
      - key: CHUNK_SIZE
        value: "512"
      - key: CHUNK_OVERLAP
        value: "50"
      - key: TOP_K
        value: "5"
      - key: ADMIN_KEY
        sync: false
      - key: HOST
        value: 0.0.0.0
